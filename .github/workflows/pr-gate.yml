name: PR Gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for iCloud sync conflicts
        run: |
          if find . -path ./node_modules -prune -o -path ./.git -prune -o -path ./static/learning-images -prune -o -name "* [0-9]*" -print | grep -q .; then
            echo "::error::iCloud sync conflicts detected"
            find . -path ./node_modules -prune -o -path ./.git -prune -o -path ./static/learning-images -prune -o -name "* [0-9]*" -print
            exit 1
          fi

  format:
    name: Format Check
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm dlx prettier --check .

  typecheck:
    name: Type Check
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec svelte-check --tsconfig ./jsconfig.json

  build:
    name: Build
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  deps:
    name: Dependency Audit
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level=high

  semgrep:
    name: Semgrep
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/semgrep-rule-links

  secret-scanning:
    name: Secret Scanning
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    if: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  required-checks:
    name: Required Checks (PR)
    runs-on: ["self-hosted", "macos", "arm64", "VidiomTM"]
    needs:
      - repo-hygiene
      - format
      - typecheck
      - build
      - deps
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ needs.repo-hygiene.result }}" != "success" ] || \
             [ "${{ needs.format.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.deps.result }}" != "success" ]; then
            echo "One or more PR gate jobs failed."
            exit 1
          fi
          echo "All PR gate jobs passed."
